{{ define "main" }}
{{ $image := resources.Get "images/profile.png" }}
<div class="grid">
  <div>{{ .Content }}</div>
  <div>
    <img src="{{ $image.RelPermalink }}" width="{{ $image.Width }}" height="{{ $image.Height }}">
  </div>
</div>
<hr>
<div>
  <h2>Recent projects</h2>
  {{ range site.RegularPages }}
  <h3>{{ .LinkTitle }}</h3>
  {{ .Content }}
  {{ end }}
</div>
{{ end }}
